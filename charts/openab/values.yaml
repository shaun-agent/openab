image:
  repository: ghcr.io/openabdev/openab
  tag: "78f8d2c"
  pullPolicy: IfNotPresent

replicas: 1

strategy:
  type: Recreate

resources: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi

discord:
  botToken: ""            # set via --set or external secret
  # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss:
  #   helm install ... --set-string discord.allowedChannels[0]="<CHANNEL_ID>"
  allowedChannels:
    - "YOUR_CHANNEL_ID"

agent:
  preset: ""              # kiro (default), codex, or claude — auto-configures image + command
  command: kiro-cli
  args:
    - acp
    - --trust-all-tools
  workingDir: /home/agent
  env: {}
    # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

pool:
  maxSessions: 10
  sessionTtlHours: 24

reactions:
  enabled: true
  removeAfterReply: false

cronjobs:
  - schedule: "*/30 * * * *"
    channel: "1491969620754567270"
    message: "Check for any new messages in this Slack discussion thread. If there are new messages since your last check, ping <@196299853884686336> with a summary of what needs decisions."
    platform: "discord"
    senderName: "SlackMonitor"
    enabled: true

agentsMd: ""
  # agentsMd: |
  #   IDENTITY - your agent identity
  #   SOUL - your agent personality
  #   USER - how agent should address the user

env: {}
envFrom: []

nodeSelector: {}
tolerations: []
affinity: {}
