apiVersion: v1
kind: ConfigMap
metadata:
  name: openab-config
data:
  config.toml: |
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    allowed_channels = ["YOUR_CHANNEL_ID"]

    [agent]
    command = "kiro-cli"
    args = ["acp", "--trust-all-tools"]
    working_dir = "/home/agent"

    [pool]
    max_sessions = 10
    session_ttl_hours = 24

    [reactions]
    enabled = true
    remove_after_reply = false

    [[cronjobs]]
    schedule = "*/30 * * * *"
    channel = "1491969620754567270"
    message = "Check for any new messages in this Slack discussion thread. If there are new messages since your last check, ping <@196299853884686336> with a summary of what needs decisions."
    platform = "discord"
    sender_name = "SlackMonitor"
    enabled = true
